<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitFlow Dashboard</title>
  <style>
    :root {
      --bg: #f3f7ff;
      --surface: #ffffff;
      --surface-soft: #f8fbff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --success-soft: #dcfce7;
      --danger-soft: #fee2e2;
      --radius: 16px;
      --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.06);
      --shadow-md: 0 12px 34px rgba(37, 99, 235, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #ebf2ff 0%, var(--bg) 34%);
      padding: 28px 18px;
    }

    .container {
      width: min(1100px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    .header {
      background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 45%, #3b82f6 100%);
      color: #fff;
      border-radius: 20px;
      padding: 28px;
      box-shadow: var(--shadow-md);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      flex-wrap: wrap;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(1.5rem, 2.5vw, 2rem);
      letter-spacing: -0.01em;
    }

    .subtitle {
      margin: 8px 0 0;
      color: rgba(255, 255, 255, 0.86);
      font-size: 0.98rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 20px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    h2 {
      margin: 0;
      font-size: 1.08rem;
    }

    .subtle {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
      transition-property: background-color, box-shadow, transform, opacity;
      box-shadow: 0 1px 2px rgba(2, 6, 23, 0.12);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: #fff;
      color: var(--primary);
    }

    .btn-primary:hover {
      background: #eff6ff;
    }

    .btn-submit {
      background: var(--primary);
      color: #fff;
    }

    .btn-submit:hover {
      background: var(--primary-dark);
    }

    .btn-yes {
      background: var(--success-soft);
      color: #166534;
      border: 1px solid #86efac;
    }

    .btn-yes:hover {
      background: #bbf7d0;
    }

    .btn-no {
      background: var(--danger-soft);
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .btn-no:hover {
      background: #fecaca;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-soft);
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 720px;
    }

    th,
    td {
      padding: 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      background: #fff;
    }

    th {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-weight: 700;
      background: var(--surface-soft);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr:hover td {
      background: #f8faff;
    }

    .badge {
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: lowercase;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .badge-active {
      color: #166534;
      background: var(--success-soft);
    }

    .badge-risk {
      color: #991b1b;
      background: var(--danger-soft);
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 26px 12px;
      font-weight: 500;
    }

    form {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr)) auto;
      gap: 12px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 0.83rem;
      color: var(--muted);
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 11px;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      background: #fff;
    }

    input::placeholder {
      color: #94a3b8;
    }

    input:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.18);
    }

    .inline-feedback {
      margin-top: 10px;
      font-size: 0.9rem;
      min-height: 20px;
    }

    .inline-feedback.success {
      color: #166534;
    }

    .inline-feedback.error {
      color: #b91c1c;
    }

    .toast {
      position: fixed;
      top: 22px;
      right: 22px;
      background: #0f172a;
      color: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: var(--shadow-md);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-8px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      max-width: 320px;
      font-size: 0.9rem;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: #14532d;
    }

    .toast.error {
      background: #7f1d1d;
    }

    @media (max-width: 900px) {
      form {
        grid-template-columns: 1fr;
      }

      .header {
        padding: 22px;
      }

      .toast {
        left: 18px;
        right: 18px;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="header">
      <div>
        <h1>FitFlow Dashboard</h1>
        <p class="subtitle">Track clients and prevent drop-offs</p>
      </div>
      <button class="btn btn-primary" id="refreshBtn" type="button">Refresh</button>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>Clients</h2>
        <span class="subtle" id="tableMessage" aria-live="polite"></span>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Goal</th>
              <th>Streak</th>
              <th>Status</th>
              <th>Check-in</th>
            </tr>
          </thead>
          <tbody id="clientRows"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <div class="section-head" style="margin-bottom:16px;">
        <h2>Add Client</h2>
      </div>

      <form id="addClientForm">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" name="name" placeholder="Alex Carter" required />
        </div>

        <div class="field">
          <label for="phone">Phone</label>
          <input id="phone" name="phone" placeholder="(555) 123-4567" required />
        </div>

        <div class="field">
          <label for="goal">Goal</label>
          <input id="goal" name="goal" placeholder="Lose 10 lbs" required />
        </div>

        <button class="btn btn-submit" type="submit">Add Client</button>
      </form>
      <div class="inline-feedback" id="formMessage" aria-live="polite"></div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const API = "http://127.0.0.1:8000";

    const clientRows = document.getElementById("clientRows");
    const refreshBtn = document.getElementById("refreshBtn");
    const tableMessage = document.getElementById("tableMessage");
    const formMessage = document.getElementById("formMessage");
    const addClientForm = document.getElementById("addClientForm");
    const toast = document.getElementById("toast");

    let toastTimeout;

    function showToast(message, type = "success") {
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.className = "toast";
      }, 2800);
    }

    function setFormFeedback(message, type = "success") {
      formMessage.textContent = message;
      formMessage.className = `inline-feedback ${type}`;
    }

    function statusBadge(status) {
      if (status === "at_risk") {
        return '<span class="badge badge-risk">at_risk</span>';
      }
      return '<span class="badge badge-active">active</span>';
    }

    function emptyStateRow() {
      return '<tr><td colspan="5" class="empty-state">No clients yet</td></tr>';
    }

    function rowTemplate(client) {
      return `
        <tr>
          <td>${client.name}</td>
          <td>${client.goal}</td>
          <td>${client.streak}</td>
          <td>${statusBadge(client.status)}</td>
          <td>
            <div class="actions">
              <button class="btn btn-yes" data-id="${client.id}" data-status="yes" type="button">YES</button>
              <button class="btn btn-no" data-id="${client.id}" data-status="no" type="button">NO</button>
            </div>
          </td>
        </tr>
      `;
    }

    async function parseJsonResponse(response, fallbackMessage) {
      let payload = {};
      try {
        payload = await response.json();
      } catch {
        throw new Error(fallbackMessage);
      }
      return payload;
    }

    async function loadClients() {
      tableMessage.textContent = "Loading clients...";
      try {
        const response = await fetch(`${API}/dashboard`);
        const payload = await parseJsonResponse(response, "Dashboard response was not valid JSON");

        if (!response.ok || !payload.success) {
          throw new Error(payload.message || "Could not load dashboard");
        }

        const clients = payload.data || [];

        if (clients.length === 0) {
          clientRows.innerHTML = emptyStateRow();
          tableMessage.textContent = "No clients yet";
          return;
        }

        clientRows.innerHTML = clients.map(rowTemplate).join("");
        tableMessage.textContent = `${clients.length} client(s)`;
      } catch (error) {
        console.error("loadClients failed:", error);
        clientRows.innerHTML = emptyStateRow();
        tableMessage.textContent = "Failed to load clients";
        showToast("Failed to load clients", "error");
      }
    }

    async function submitCheckin(clientId, status) {
      try {
        const response = await fetch(`${API}/checkin`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ client_id: Number(clientId), status })
        });

        const payload = await parseJsonResponse(response, "Check-in response was not valid JSON");

        if (!response.ok || !payload.success) {
          throw new Error(payload.message || "Check-in failed");
        }

        tableMessage.textContent = payload.message || "Check-in saved";
        showToast(payload.message || "Check-in saved", "success");
        await loadClients();
      } catch (error) {
        console.error("submitCheckin failed:", error);
        tableMessage.textContent = "Could not save check-in";
        showToast("Could not save check-in", "error");
      }
    }

    async function addClient(event) {
      event.preventDefault();

      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const goal = document.getElementById("goal").value.trim();

      if (!name || !phone || !goal) {
        setFormFeedback("Please fill in name, phone, and goal.", "error");
        showToast("Please fill in all fields", "error");
        return;
      }

      try {
        const response = await fetch(`${API}/clients`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ name, phone, goal })
        });

        const payload = await parseJsonResponse(response, "Client response was not valid JSON");

        if (!response.ok) {
          throw new Error(payload.message || "Could not add client");
        }

        addClientForm.reset();
        setFormFeedback("Client added successfully.", "success");
        showToast("Client added successfully", "success");
        await loadClients();
      } catch (error) {
        console.error("addClient failed:", error);
        setFormFeedback("Could not add client. Please try again.", "error");
        showToast("Could not add client", "error");
      }
    }

    clientRows.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) return;

      const clientId = target.dataset.id;
      const status = target.dataset.status;
      if (!clientId || !status) return;

      submitCheckin(clientId, status);
    });

    refreshBtn.addEventListener("click", loadClients);
    addClientForm.addEventListener("submit", addClient);

    loadClients();
  </script>
</body>
</html>
