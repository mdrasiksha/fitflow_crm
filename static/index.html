<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitFlow Auth</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --bg-start: #eef2ff;
      --bg-end: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe3ef;
      --danger: #dc2626;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.14);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .auth-card {
      width: min(100%, 420px);
      background: var(--card);
      border-radius: var(--radius);
      padding: 30px;
      box-shadow: var(--shadow);
      border: 1px solid #edf2f7;
    }

    .heading {
      text-align: center;
      margin-bottom: 24px;
    }

    .heading h1 {
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .heading p {
      color: var(--muted);
      font-size: 0.97rem;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: #f1f5f9;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 20px;
      gap: 4px;
    }

    .tab-btn {
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: #334155;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 10px 12px;
      cursor: pointer;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .tab-btn.active {
      background: #ffffff;
      color: var(--primary);
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.08);
    }

    .auth-form {
      display: none;
      gap: 14px;
    }

    .auth-form.active {
      display: grid;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 0.86rem;
      font-weight: 600;
      color: #334155;
    }

    .input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 13px;
      font-size: 0.96rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input::placeholder {
      color: #94a3b8;
    }

    .input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
    }

    .error {
      min-height: 16px;
      color: var(--danger);
      font-size: 0.82rem;
      line-height: 1.2;
    }

    .form-link {
      text-align: right;
      margin-top: -6px;
      margin-bottom: 4px;
    }

    .form-link a {
      color: var(--primary);
      text-decoration: none;
      font-size: 0.86rem;
      font-weight: 600;
    }

    .form-link a:hover {
      text-decoration: underline;
    }

    .submit-btn {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.96rem;
      font-weight: 700;
      color: #ffffff;
      background: var(--primary);
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.2s ease;
      width: 100%;
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .submit-btn:disabled {
      cursor: wait;
      opacity: 0.75;
      transform: none;
    }

    @media (max-width: 480px) {
      body {
        padding: 14px;
      }

      .auth-card {
        padding: 22px;
      }

      .heading h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <main class="auth-card" aria-live="polite">
    <header class="heading">
      <h1>Welcome to FitFlow</h1>
      <p>Track clients and never lose them</p>
    </header>

    <div class="tabs" role="tablist" aria-label="Authentication tabs">
      <button type="button" class="tab-btn active" id="loginTab" data-target="loginForm" role="tab" aria-selected="true">Login</button>
      <button type="button" class="tab-btn" id="signupTab" data-target="signupForm" role="tab" aria-selected="false">Signup</button>
    </div>

    <form id="loginForm" class="auth-form active" novalidate>
      <div class="field">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" class="input" type="email" placeholder="you@fitflow.com" autocomplete="email" required />
        <p class="error" data-error-for="loginEmail"></p>
      </div>

      <div class="field">
        <label for="loginPassword">Password</label>
        <input id="loginPassword" class="input" type="password" placeholder="Enter your password" autocomplete="current-password" required minlength="6" />
        <p class="error" data-error-for="loginPassword"></p>
      </div>

      <p class="form-link"><a href="#" aria-label="Forgot password">Forgot Password?</a></p>
      <button type="submit" class="submit-btn">Login</button>
    </form>

    <form id="signupForm" class="auth-form" novalidate>
      <div class="field">
        <label for="signupName">Name</label>
        <input id="signupName" class="input" type="text" placeholder="Your full name" autocomplete="name" required minlength="2" />
        <p class="error" data-error-for="signupName"></p>
      </div>

      <div class="field">
        <label for="signupPhone">Phone</label>
        <input id="signupPhone" class="input" type="tel" placeholder="(555) 123-4567" autocomplete="tel" required />
        <p class="error" data-error-for="signupPhone"></p>
      </div>

      <div class="field">
        <label for="signupEmail">Email</label>
        <input id="signupEmail" class="input" type="email" placeholder="you@fitflow.com" autocomplete="email" required />
        <p class="error" data-error-for="signupEmail"></p>
      </div>

      <div class="field">
        <label for="signupPassword">Password</label>
        <input id="signupPassword" class="input" type="password" placeholder="Create a secure password" autocomplete="new-password" required minlength="6" />
        <p class="error" data-error-for="signupPassword"></p>
      </div>

      <button type="submit" class="submit-btn">Create Account</button>
    </form>
  </main>

  <script>
    const tabs = document.querySelectorAll('.tab-btn');
    const forms = document.querySelectorAll('.auth-form');

    function switchTab(targetId) {
      tabs.forEach((tab) => {
        const isActive = tab.dataset.target === targetId;
        tab.classList.toggle('active', isActive);
        tab.setAttribute('aria-selected', String(isActive));
      });

      forms.forEach((form) => {
        const active = form.id === targetId;
        form.classList.toggle('active', active);
      });
    }

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => switchTab(tab.dataset.target));
    });

    function setError(input, message) {
      const errorNode = document.querySelector(`[data-error-for="${input.id}"]`);
      if (errorNode) {
        errorNode.textContent = message;
      }
      input.setAttribute('aria-invalid', message ? 'true' : 'false');
    }

    function validateInput(input) {
      const value = input.value.trim();

      if (input.validity.valueMissing) {
        setError(input, 'This field is required.');
        return false;
      }

      if (input.type === 'email' && input.validity.typeMismatch) {
        setError(input, 'Please enter a valid email address.');
        return false;
      }

      if (input.id.toLowerCase().includes('password') && value.length < 6) {
        setError(input, 'Password must be at least 6 characters.');
        return false;
      }

      if (input.id === 'signupPhone' && !/^[+()\-\s\d]{7,}$/.test(value)) {
        setError(input, 'Please enter a valid phone number.');
        return false;
      }

      if (input.id === 'signupName' && value.length < 2) {
        setError(input, 'Please enter your full name.');
        return false;
      }

      setError(input, '');
      return true;
    }

    function setLoadingState(form, loading) {
      const button = form.querySelector('.submit-btn');
      if (!button) return;

      if (!button.dataset.defaultText) {
        button.dataset.defaultText = button.textContent;
      }

      button.disabled = loading;
      button.textContent = loading ? 'Loading...' : button.dataset.defaultText;
    }

    forms.forEach((form) => {
      const inputs = form.querySelectorAll('input');

      inputs.forEach((input) => {
        input.addEventListener('input', () => validateInput(input));
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        let isValid = true;
        inputs.forEach((input) => {
          const valid = validateInput(input);
          if (!valid) isValid = false;
        });

        if (!isValid) return;

        setLoadingState(form, true);

        try {
          await new Promise((resolve) => setTimeout(resolve, 1200));
        } finally {
          setLoadingState(form, false);
        }
      });
    });
  </script>
</body>
</html>
